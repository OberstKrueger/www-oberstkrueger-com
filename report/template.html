<!doctype html>
<html lang="en-us">
<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<title>{{.Doc.title}}</title>

	<meta name="description" content="The Krueger Report" />
	<meta name="author" content="OberstKrueger" />

	<link rel="me" href="https://github.com/oberstkrueger" />

	<link rel="stylesheet" href="/report/style.css" />
	<link rel="apple-touch-icon" href="report/images/apple-touch-icon.png">

	<link rel="alternate" type="application/rss+xml" title="The Krueger Report" href="/report/updates.xml" />
</head>
<body class="{{.Doc.type}}">
	{{if eq .URL.Path "/report/"}}
	<main>
		<header>
			<h1><a href="/">{{.Doc.title}}</a></h1>
		</header>
{{.Doc.body}}
		<footer>
			<a href="{{.URI}}">published: <time datetime="{{.Doc.created}}">{{.Doc.created}}</time><br />updated: <time datetime="{{.Doc.updated}}">{{.Doc.updated}}</time></a>
		</footer>
	{{else}}
	<main>
		<header>
			<h1><a href="/">{{.Doc.title}}</a></h1>
		</header>
		<article>
{{.Doc.body}}
		</article>
		<footer>
			<a href="{{.URI}}">published: <time datetime="{{.Doc.created}}">{{.Doc.created}}</time><br />updated: <time datetime="{{.Doc.updated}}">{{.Doc.updated}}</time></a>
		</footer>
	{{end}}
	</main>
</body>
</html>
